# RAGFlow service — run alongside the main application
# Usage: docker-compose -f docker-compose.ragflow.yml up -d
# Requires: RAGFLOW_API_KEY set in .env

services:
  ragflow:
    image: infiniflow/ragflow:latest
    container_name: marketing-tech-ragflow
    ports:
      - "9380:9380"
    environment:
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-ragflow-local-dev-key}
    volumes:
      - ragflow_data:/ragflow/data
      - ragflow_logs:/ragflow/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9380/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ragflow_data:
    driver: local
  ragflow_logs:
    driver: local
