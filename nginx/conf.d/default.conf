server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;
    charset utf-8;
    client_max_body_size 512M;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options           "DENY"                      always;
    add_header X-Content-Type-Options    "nosniff"                   always;
    add_header X-XSS-Protection          "1; mode=block"             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP — allow our CDN sources (Tailwind, Alpine, Chart.js, GSAP, Three.js, Lottie, Fonts)
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Health endpoint (no logging) ──────────────────────────
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── Telegram webhook - dedicated tight rate limit ─────────
    location = /webhook/telegram {
        limit_req zone=webhook burst=30 nodelay;
        limit_conn conn_limit 5;

        try_files $uri /index.php?$query_string;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 30s;
        include fastcgi_params;
    }

    # ── API routes ────────────────────────────────────────────
    location ^~ /api {
        limit_req zone=api burst=30 nodelay;

        try_files $uri /index.php?$query_string;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
        include fastcgi_params;
    }

    # ── Horizon dashboard ─────────────────────────────────────
    location ^~ /horizon {
        try_files $uri /index.php?$query_string;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 30s;
        include fastcgi_params;
    }

    # ── Static assets (Vite build output) ────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Everything else → Laravel ─────────────────────────────
    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        include fastcgi_params;
    }

    # ── Block sensitive paths ─────────────────────────────────
    location ~ /\.(env|git|htaccess|gitignore) {
        deny all;
        return 404;
    }

    location ~ \.(sh|sql|bak|log)$ {
        deny all;
        return 404;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;
}
